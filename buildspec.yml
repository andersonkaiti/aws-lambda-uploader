version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
  pre_build:
    commands:
      - pnpm install --frozen-lockfile
  build:
    commands:
      - pnpm build
  post_build:
    commands:
      - cd dist && zip -r ../function.zip . && cd ..
      - aws lambda update-function-code --function-name "$FUNCTION_NAME" --zip-file fileb://function.zip
